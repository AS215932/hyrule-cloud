name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref. Per-branch grouping so a push to main
# doesn't kill an open PR's CI on a different branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    # Branch protection requires this exact check name. Don't rename without
    # updating the rule in repo settings.
    name: test
    runs-on: [self-hosted, linux, x64, hyrule-public-pr]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          # ruff-on-touched-files needs the base ref for `git diff`. Fetch
          # depth 0 is cheaper than fetching just the base — self-hosted
          # runner caches the .git anyway.
          fetch-depth: 0

      # actions/setup-python has no Debian 13 build for 3.12; the runner
      # ships system Python 3.13 which satisfies requires-python = ">=3.12"
      # and matches the api VM in production.
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Sync deps (system python)
        # `--extra dev` pulls in pytest/pytest-asyncio/ruff/mypy from
        # `[project.optional-dependencies].dev` in pyproject.toml.
        # hyrule-web uses `--group dev` because it declares deps under
        # `[dependency-groups]`; the flag differs by where the group lives.
        run: ~/.local/bin/uv sync --frozen --extra dev

      # Ruff is gated on touched files only — the 101 pre-existing errors
      # in this repo are tracked under a separate cleanup PR. Full-tree
      # ruff will become required once that lands. For pushes to main we
      # diff against the previous commit on main; for PRs, against the
      # merge-base.
      - name: Ruff (touched files only)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          CHANGED=$(git diff --name-only --diff-filter=ACMR "$BASE"...HEAD -- '*.py' || true)
          if [ -n "$CHANGED" ]; then
            echo "Linting:"
            echo "$CHANGED"
            ~/.local/bin/uv run ruff check $CHANGED
          else
            echo "No Python files changed; skipping ruff."
          fi

      # Mypy strict similarly gated on touched files. Cleanup PR will flip
      # to full-tree.
      #
      # `|| true` is deliberate and TEMPORARY: the existing tree has
      # pre-A0 type holes (~100 errors from baseline 0f0d765) that don't
      # block A0's correctness. The mypy output is still surfaced in CI
      # logs for signal. Removal criteria: once the dedicated mypy-cleanup
      # PR lands (companion to the ruff cleanup PR, both scheduled
      # immediately after the Wave 1 A0 hotfix), drop the `|| true` here
      # and add this step as a required check in branch protection.
      - name: Mypy (touched files only, strict)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          CHANGED=$(git diff --name-only --diff-filter=ACMR "$BASE"...HEAD -- 'hyrule_cloud/**/*.py' || true)
          if [ -n "$CHANGED" ]; then
            # TODO(post-A0 cleanup): remove `|| true` after the type-cleanup
            # PR lands so mypy failures gate merges.
            ~/.local/bin/uv run mypy --strict $CHANGED || true
          else
            echo "No hyrule_cloud Python files changed; skipping mypy."
          fi

      - name: Pytest
        run: |
          ~/.local/bin/uv run pytest -q

      # verify_facilitator.py is the CI gate per feedback_verified_payment_chains.md.
      # Triggers only when PaymentConfig itself changes (not unrelated feature
      # flags or other config edits) to avoid burning facilitator-side quota
      # on every PR. Failure here blocks merge.
      - name: Verify payment facilitator (when PaymentConfig changes)
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="${{ github.event.before }}"
          fi
          DIFF=$(git diff "$BASE"...HEAD -- hyrule_cloud/config.py || true)
          if echo "$DIFF" | grep -qE '^[+-].*(class PaymentConfig|facilitator_url|networks[[:space:]]*[:=]|"network":|receiver_address)'; then
            echo "PaymentConfig changed — running facilitator smoke test."
            PYTHONPATH=. ~/.local/bin/uv run python scripts/verify_facilitator.py
          else
            echo "PaymentConfig unchanged — skipping facilitator smoke."
          fi
