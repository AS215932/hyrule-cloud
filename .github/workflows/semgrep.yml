---
name: semgrep

# Token-less Semgrep SAST on the UNPRIVILEGED hyrule-public-pr runner; uploads
# SARIF to GitHub Code Scanning (free for this public repo). No SEMGREP_APP_TOKEN.
# Reporting-only during baseline (continue-on-error) — flip to a gate later.

on:
  pull_request:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .github/workflows/semgrep.yml
      - .semgrep.yml
  schedule:
    - cron: '37 3 * * *'

permissions:
  contents: read
  security-events: write

concurrency:
  group: semgrep-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    name: semgrep
    runs-on: [self-hosted, linux, x64, hyrule-public-pr]
    timeout-minutes: 20
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      # Run via `docker run` (not a job-level container:) so upload-sarif (Node)
      # runs in the normal runner env, not the minimal semgrep image.
      - name: Run Semgrep
        continue-on-error: true            # reporting-only during baseline
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD:/src" -w /src \
            semgrep/semgrep@sha256:bc8b15e245d7bd392bcadce7ef4db36601b375fab35bfd8070ed8ae3d7824c74 \
            semgrep scan \
              --config p/ci --config p/github-actions --config p/secrets --config p/python \
              --metrics off \
              --sarif --output semgrep.sarif
      - name: Upload SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@84498526a009a99c875e83ef4821a8ba52de7c22  # v3 (2.25.5 bundle)
        with:
          sarif_file: semgrep.sarif
