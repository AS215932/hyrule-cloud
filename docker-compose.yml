services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: hyrule
      POSTGRES_PASSWORD: hyrule
      POSTGRES_DB: hyrule
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hyrule"]
      interval: 5s
      timeout: 3s
      retries: 5

  tor:
    image: dperson/torproxy
    ports:
      - "9050:9050"
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: api
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      HYRULE_DATABASE_URL: postgresql+asyncpg://hyrule:hyrule@postgres/hyrule
    command: "alembic upgrade head"
    restart: "no"

  api:
    build:
      context: .
      target: api
    ports:
      - "8402:8402"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      # Override DB URL to point at compose Postgres
      HYRULE_DATABASE_URL: postgresql+asyncpg://hyrule:hyrule@postgres/hyrule
      DNS_BLOCKLIST_DATA_DIR: /var/lib/hyrule-cloud/blocklists
    volumes:
      - blocklist_data:/var/lib/hyrule-cloud/blocklists:ro
    command: "uvicorn hyrule_cloud.app:app --host :: --port 8402"

  worker:
    build:
      context: .
      target: worker
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file: .env
    environment:
      HYRULE_DATABASE_URL: postgresql+asyncpg://hyrule:hyrule@postgres/hyrule
      DNS_BLOCKLIST_DATA_DIR: /var/lib/hyrule-cloud/blocklists
    volumes:
      - blocklist_data:/var/lib/hyrule-cloud/blocklists
    restart: unless-stopped

volumes:
  pgdata:
  blocklist_data:
