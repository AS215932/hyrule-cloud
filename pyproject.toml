[project]
name = "hyrule-cloud"
version = "0.1.0"
description = "Agentic VPS hosting with x402 payments on AS215932"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "pydantic>=2.10",
    "pydantic-settings>=2.7",
    "httpx[socks]>=0.28",
    "pyyaml>=6.0",
    "pycdlib>=1.14",
    "jinja2>=3.1",
    "structlog>=24.4",
    "apscheduler>=3.10",
    # x402 official SDK (x402-foundation) — v2 protocol; svm extra pulls in
    # solana + solders for the Solana exact scheme (Block H)
    "x402[fastapi,evm,svm]>=2.9",
    # DNS (RFC 2136 dynamic updates)
    "dnspython>=2.6",
    # XO WebSocket JSON-RPC
    "websockets>=13.0",
    # Database
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "alembic>=1.14",
    # MCP server
    "mcp>=1.0",
    # Auth (Block A1): argon2id password + recovery-code hashing
    "argon2-cffi>=23.1",
    # TTL caches for rate limiting + metrics
    "cachetools>=5.5",
    # ecrecover for EVM wallet-signature claim/recovery (Block A1 claim, Block F recovery)
    "eth-account>=0.13",
    # Block E: pure-Python BIP32/BIP84 derivation for BTC HD addresses
    # Pin <2.10 + explicit coincurve<21 — coincurve 21.x has a hatchling
    # LICENSE-file build bug that prevents source builds on this environment.
    "bip-utils>=2.9,<2.10",
    "coincurve>=20.0,<21.0",
    # Block E: server-side QR-code generation (SVG output, ~10kb runtime)
    "segno>=1.6",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.8",
    "mypy>=1.13",
    "aiosqlite>=0.20",
]

[project.scripts]
hyrule-mcp = "hyrule_cloud.mcp_server:main"

[tool.setuptools.packages.find]
include = ["hyrule_cloud*"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "RUF"]

[tool.mypy]
python_version = "3.12"
strict = true

[dependency-groups]
dev = [
    "respx>=0.23.1",
]
